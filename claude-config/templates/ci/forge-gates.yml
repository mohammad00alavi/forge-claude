# Forge CI gates — copy to .github/workflows/forge-gates.yml
#
# Mirrors the verifier's objective gates (typecheck / lint / test / build) so the
# same checks that gate a local merge also run on every PR. Node is the default;
# adapt the setup step per stack.
#
# NOTE: Forge agents cannot write .github/workflows/ (it's deny-listed in
# settings.json), so devops PREPARES this file and the human installs it.
name: Forge gates
on:
  pull_request:
  push:
    branches: [main]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'   # or: node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm run test --if-present
      - run: npm run build --if-present
